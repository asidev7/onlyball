{% comment %}
Signature "red lottery ball" mark. Usage: {% include "core/svg/ball_logo.html" with size=28 number="01" %}
`number` is optional -- omit for the plain logo mark (used as the "O" in ONLYBALL).
{% endcomment %}
<svg width="{{ size|default:28 }}" height="{{ size|default:28 }}" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0" aria-hidden="true">
  <circle cx="20" cy="20" r="19" fill="#E4002B" stroke="#111111" stroke-opacity="0.1"/>
  <circle cx="14" cy="13" r="5" fill="white" fill-opacity="0.25"/>
  {% if number %}
  <text x="20" y="27" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="18" fill="white">{{ number }}</text>
  {% endif %}
</svg>
